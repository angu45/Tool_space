<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Size Converter</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
text-align:center;
padding:30px;
}
.container{
background:#fff;
padding:20px;
border-radius:15px;
max-width:600px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,.2);
}
button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
cursor:pointer;
font-size:16px;
}
button:hover{
background:#0056b3;
}
canvas{
display:none;
}
</style>

</head>
<body>

<div class="container">

<h2>Icon Size Generator</h2>

<p>Upload any image and download icons in required sizes.</p>

<input type="file" id="upload" accept="image/*">

<div id="downloads"></div>

</div>

<script>

const upload=document.getElementById("upload");
const downloads=document.getElementById("downloads");

const sizes=[16,128,256,512];

upload.addEventListener("change",function(e){

downloads.innerHTML="";

const file=e.target.files[0];
if(!file)return;

const img=new Image();

img.onload=function(){

sizes.forEach(size=>{

const canvas=document.createElement("canvas");
canvas.width=size;
canvas.height=size;

const ctx=canvas.getContext("2d");

ctx.clearRect(0,0,size,size);

ctx.drawImage(img,0,0,size,size);

const link=document.createElement("a");

link.href=canvas.toDataURL("image/png");

link.download=`icon-${size}x${size}.png`;

const btn=document.createElement("button");

btn.innerText=`Download ${size}x${size}`;

btn.onclick=function(){
link.click();
}

downloads.appendChild(btn);

});

}

img.src=URL.createObjectURL(file);

});

</script>

</body>
</html>
